{% extends "base.html" %}

{% block title %}About{% endblock %}

{% block style %}
<style>
    .about-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 2rem;
        text-align: center;
    }

    .about-card h1 {
        font-size: 1.5rem;
        color: #0f172a;
        margin-bottom: 1rem;
    }

    .about-card p {
        color: #64748b;
        font-size: 15px;
        line-height: 1.7;
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}

{% block content %}
    <div class="about-card">
        <h1>About Book Library</h1>
        <p>A simple app built with Flask and Jinja2 to display a list of books.</p>
        <p>This project demonstrates how base templates work in Flask.</p>
    </div>
{% endblock %}
