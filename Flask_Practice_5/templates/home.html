{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block style %}
<style>
    .hero {
        background: #1d4ed8;
        color: white;
        padding: 4rem 2rem;
        text-align: center;
        border-radius: 12px;
        margin-bottom: 2rem;
    }

    .hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .hero p  { font-size: 1rem; opacity: 0.85; }

    .btn {
        display: inline-block;
        margin-top: 1.5rem;
        background: white;
        color: #1d4ed8;
        padding: 10px 24px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
    <div class="hero">
        <h1>Welcome to Book Library</h1>
        <p>Discover your next favourite book</p>
        <a href="/books" class="btn">Browse Books</a>
    </div>
{% endblock %}
