<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %} | Book Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        nav {
            background: #1d4ed8;
            padding: 1rem 2rem;
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 15px;
        }

        nav a:hover { text-decoration: underline; }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #94a3b8;
            font-size: 13px;
            border-top: 1px solid #e2e8f0;
            margin-top: 3rem;
        }
    </style>

    {% block style %}{% endblock %}
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/books">Books</a>
        <a href="/about">About</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>Book Library &copy; 2024</footer>

</body>
</html>
