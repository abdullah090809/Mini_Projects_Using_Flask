{% extends "base.html" %}

{% block title %}Books{% endblock %}

{% block style %}
<style>
    h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        color: #0f172a;
    }

    .book-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 1rem 1.25rem;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .dot {
        width: 8px;
        height: 8px;
        background: #1d4ed8;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .book-card span {
        font-size: 15px;
        color: #1e293b;
    }
</style>
{% endblock %}

{% block content %}
    <h1>All Books</h1>
    {% for book in books %}
        <div class="book-card">
            <div class="dot"></div>
            <span>{{ book }}</span>
        </div>
    {% endfor %}
{% endblock %}
