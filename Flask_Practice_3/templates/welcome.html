<!DOCTYPE html>
<html>
<head>
    <title>Welcome Page</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            color:white;
        }

        .welcome-box{
            background:rgba(255,255,255,0.1);
            padding:40px 60px;
            border-radius:12px;
            text-align:center;
            backdrop-filter: blur(10px);
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            margin:0;
            font-size:40px;
        }

        p{
            margin-top:10px;
            font-size:18px;
            opacity:0.9;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            border:none;
            border-radius:6px;
            background:white;
            color:#764ba2;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#eee;
        }
    </style>
</head>

<body>

    <div class="welcome-box">
        <h1>Welcome Abdullah 🎉</h1>
        <p>You have successfully logged in.</p>

        <button onclick="window.location.href='/'">Logout</button>
    </div>

</body>
</html>
