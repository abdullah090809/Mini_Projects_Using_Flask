<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            width:300px;
            text-align:center;
        }

        .login-box h2{
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0 15px 0;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }

        input:focus{
            border-color:#4facfe;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            border-radius:5px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#2f8cf0;
        }

        label{
            font-weight:bold;
            float:left;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <form method="POST" action="/submit">

            <label>Name</label>
            <input type="text" name="username" placeholder="Enter your username">

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password">

            <button type="submit">Login</button>

        </form>
    </div>

</body>
</html>
