<!DOCTYPE html>
<html>
<head>
    <title>Invalid Credentials</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background: linear-gradient(135deg,#ff6a6a,#ff3d3d);
            color:white;
        }

        .error-box{
            background:rgba(255,255,255,0.1);
            padding:40px 60px;
            border-radius:12px;
            text-align:center;
            backdrop-filter: blur(10px);
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            margin-bottom:15px;
            font-size:32px;
        }

        p{
            font-size:16px;
            margin-bottom:20px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:6px;
            background:white;
            color:#ff3d3d;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#eee;
        }
    </style>
</head>

<body>

    <div class="error-box">
        <h1>Invalid Credentials ❌</h1>
        <p>Please try logging in again.</p>

        <button onclick="window.location.href='/'">Back to Login</button>
    </div>

</body>
</html>
