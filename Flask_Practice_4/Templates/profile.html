<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            width: 480px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .card-header {
            background: #f8fafc;
            padding: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #dbeafe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #1d4ed8;
            flex-shrink: 0;
        }

        .header-text {
            flex: 1;
        }

        .header-text h1 {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
        }

        .header-text p {
            font-size: 13px;
            color: #64748b;
            margin-top: 3px;
        }

        .badge {
            background: #dcfce7;
            color: #15803d;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 999px;
        }

        .card-body {
            padding: 1.5rem;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .subject-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .subject-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #3b82f6;
            flex-shrink: 0;
        }

        .subject-item span {
            font-size: 14px;
            color: #1e293b;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <div class="avatar">{{ user[0] | upper }}</div>
            <div class="header-text">
                <h1>Welcome, {{ user }}</h1>
                <p>Student Profile</p>
            </div>
            {% if is_topper %}
            <span class="badge">Topper</span>
            {% endif %}
        </div>

        <div class="card-body">
            <p class="section-label">Enrolled Subjects</p>
            <div class="subject-list">
                {% for subject in subjects %}
                <div class="subject-item">
                    <div class="dot"></div>
                    <span>{{ subject }}</span>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

</body>
</html>
