<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-lg" style="width: 380px">
        <h2 class="text-center fw-bold mb-1">Login 🔐</h2>
        <p class="text-center text-muted mb-4">Enter your credentials</p>
        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" placeholder="Enter username" class="form-control form-control-lg">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" placeholder="Enter password" class="form-control form-control-lg">
            </div>
            <button type="submit" class="btn btn-dark w-100 btn-lg fw-semibold">Login</button>
        </form>
    </div>
</body>
</html>
